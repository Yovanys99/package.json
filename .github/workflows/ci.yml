name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '16'
      - run: npm install
      - run: node -e "const v = process.versions.node.split('.')[0]; if(parseInt(v) < 18) { console.error('npm warn EBADENGINE unsupported engine'); console.error('npm error Required: {node: >=18}'); console.error('npm error Actual: {node: v' + v + '}'); process.exit(1); }"
